<html>
    <head>
       <title>Camilla Casado's experience</title>
       <link rel="stylesheet" href="experience.css">
    </head>
    <body>
        <header>
            <img class="header_pic" src="header_umich.jpg" alt="header picture: old pic of cs at umich">
        </header>
        <div class="main_box">
            <!-- buttons :p -->
            <div class="nav-box">
                <div class="projects-box">
                    <button id="projects-btn" class="projects">projects</button>
                </div>
                <div class="misc-box">
                    <button id="misc-btn" class="misc">about me</button>
                </div>
                <div class="linkedin-box">
                    <button id="linkedin-btn" class="linkedin">linkedIn</button>
                    <span id="copy-message-linkedin" class="copy-message-linkedin">Copied to Clipboard!</span>
                </div>
                <div class="email-box">
                    <button id="email-btn" class="email">Email</button>
                    <span id="copy-message-email" class="copy-message-email">Copied to Clipboard!</span>
                </div>
                <div class="github-box">
                    <button id="github-btn" class="github">GitHub</button>
                    <span id="copy-message-github" class="copy-message-github">Copied to Clipboard!</span>
                </div>
            </div>
            <div class="name-header">
                <p class="name">Camilla Casado's Experience</p>                
            </div>
         </div>
         <script src="experience.js"></script>
    </body>
</html>
